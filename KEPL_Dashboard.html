// ── HELPERS ──────────────────────────────────────────────────────────────────
const p2 = (n) => n.toFixed(2);
const pct = (a,b) => b>0 ? Math.min(100,(a/b)*100) : 0;

const stColor = (p) => {
  if (p <= 0)  return ["#EF4444","#FEF2F2","#991B1B","Not Started"];
  if (p < 15)  return ["#F59E0B","#FFFBEB","#92400E","Initiated"];
  if (p < 50)  return ["#3B82F6","#EFF6FF","#1D4ED8","In Progress"];
  if (p < 85)  return ["#10B981","#ECFDF5","#065F46","Advanced"];
  return              ["#059669","#D1FAE5","#064E3B","Near Complete"];
};

const structStatus = (lhs, rhs) => {
  if (!lhs && !rhs) return { bg:"#FEF2F2", tc:"#991B1B", lbl:"Not Started" };
  const s = ((lhs||"")+" "+(rhs||"")).toLowerCase();
  if ((s.includes("complete") || s.includes("completed")) && !s.includes("progress") && !s.includes("in progress"))
    return { bg:"#D1FAE5", tc:"#065F46", lbl:"Complete" };
  return { bg:"#FEF9C3", tc:"#92400E", lbl:"WIP" };
};

// ── REUSABLE UI ───────────────────────────────────────────────────────────────
function Box({ children, style={} }) {
  return <div style={{ background:"white", borderRadius:12, padding:"18px 20px",
    boxShadow:"0 1px 8px #0000000d", marginBottom:16, ...style }}>{children}</div>;
}
function BHead({ children }) {
  return <div style={{ fontWeight:800, fontSize:13, color:"#0F2942", borderBottom:"2px solid #DBEAFE",
    paddingBottom:8, marginBottom:14 }}>{children}</div>;
}
function KPI({ label, value, sub, accent="#1E40AF", bg="#EFF6FF" }) {
  return (
    <div style={{ background:bg, borderLeft:`4px solid ${accent}`, borderRadius:10,
      padding:"14px 18px", flex:"1 1 180px", minWidth:160 }}>
      <div style={{ fontSize:10, fontWeight:700, color:"#64748B", textTransform:"uppercase",
        letterSpacing:.8, marginBottom:4 }}>{label}</div>
      <div style={{ fontSize:22, fontWeight:800, color:accent, lineHeight:1.1 }}>{value}</div>
      {sub && <div style={{ fontSize:10.5, color:"#64748B", marginTop:4 }}>{sub}</div>}
    </div>
  );
}

function Bar({ comp, wip=0, total=100, showPct=true, h=20 }) {
  const cp = Math.min(100, pct(comp, total));
  const wp = Math.min(100-cp, pct(wip, total));
  return (
    <div style={{ background:"#E2E8F0", borderRadius:6, height:h, position:"relative", overflow:"hidden" }}>
      {cp>0 && <div style={{ position:"absolute", left:0, top:0, height:"100%", width:`${cp}%`, background:"#10B981" }}/>}
      {wp>0 && <div style={{ position:"absolute", left:`${cp}%`, top:0, height:"100%", width:`${wp}%`, background:"#FBBF24" }}/>}

        <span style={{ position:"absolute", width:"100%", textAlign:"center",

      )}

  );
}

// ── STRUCTURE PROGRESS CARD ───────────────────────────────────────────────────
function StrCard({ s }) {
  const wipTotal = s.wip_f + s.wip_s + s.wip_ss;
  const compPct  = pct(s.comp,    s.scope);
  const wipPct   = pct(wipTotal,  s.scope);
  const pendPct  = pct(s.pending, s.scope);
  const [ac, bgc, tc, lbl] = stColor(compPct + wipPct);

  return (
    <div style={{ background:"white", border:`1.5px solid ${ac}40`, borderTop:`4px solid ${ac}`,
      borderRadius:10, padding:16, boxShadow:"0 1px 6px #0000000a" }}>

      {/* Title row */}
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:10 }}>
        <div>
          <div style={{ fontSize:15, fontWeight:800, color:"#0F2942" }}>{s.icon} {s.type}</div>
          <div style={{ fontSize:10.5, color:"#64748B", marginTop:1 }}>
            Sch-G Wt: <b>{s.sg_wt}%</b> &nbsp;|&nbsp;
            Contract: <b>{s.sg_cr > 0 ? `₹${p2(s.sg_cr)} Cr` : "—"}</b>
          </div>
        </div>
        <span style={{ background:bgc, color:tc, fontSize:10, fontWeight:700,
          padding:"3px 9px", borderRadius:8, border:`1px solid ${ac}` }}>{lbl}</span>
      </div>

      {/* Count boxes */}
      <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:6, marginBottom:12 }}>
        {[["Scope",s.scope,"#374151","#F8FAFC"],["Done",s.comp,"#059669","#D1FAE5"],
          ["WIP",wipTotal,"#D97706","#FEF3C7"],["Pending",s.pending,"#DC2626","#FEF2F2"]].map(([l,v,c,b])=>(
          <div key={l} style={{ background:b, borderRadius:7, padding:"6px 4px", textAlign:"center" }}>
            <div style={{ fontSize:19, fontWeight:800, color:c }}>{v}</div>
            <div style={{ fontSize:9.5, color:c, fontWeight:600 }}>{l}</div>
          </div>
        ))}
      </div>

      {/* Detail bars */}
      {[["Completed",s.comp,"#10B981"],
        s.wip_f  > 0 && ["Foundation WIP",s.wip_f,"#60A5FA"],
        s.wip_s  > 0 && ["Sub-Str WIP",s.wip_s,"#FBBF24"],
        s.wip_ss > 0 && ["Super-Str WIP",s.wip_ss,"#F97316"],
        ["Pending",s.pending,"#F87171"],
      ].filter(Boolean).map(([l,v,c])=>(
        <div key={l} style={{ marginBottom:5 }}>
          <div style={{ display:"flex", justifyContent:"space-between", fontSize:10, marginBottom:2 }}>
            <span style={{ color:"#475569", fontWeight:600 }}>{l}</span>
            <span style={{ color:c, fontWeight:700 }}>{v} / {s.scope}</span>
          </div>
          <div style={{ background:"#F1F5F9", borderRadius:4, height:9, overflow:"hidden" }}>
            <div style={{ width:`${pct(v,s.scope)}%`, height:"100%", background:c, borderRadius:4 }}/>
          </div>
        </div>
      ))}

      {/* Overall bar */}
      <div style={{ marginTop:8 }}>
        <Bar comp={s.comp} wip={wipTotal} total={s.scope} h={18}/>
      </div>

      {s.desc && <div style={{ fontSize:9.5, color:"#94A3B8", marginTop:6, fontStyle:"italic" }}>{s.desc}</div>}
    </div>
  );
}

// ── HIGHWAY ROW ───────────────────────────────────────────────────────────────
function HwyRow({ h }) {
  const pcPct  = pct(h.pc, h.scope);
  const pwPct  = pct(h.pw, h.scope);
  const acPct  = pct(h.awf_c, h.scope);
  const awPct  = pct(h.awf_w, h.scope);
  const laPct  = pct(h.la, h.scope);
  const [ac,,tc,lbl] = stColor(pcPct+pwPct);
  const fmt = (v) => v >= 1000 ? v.toLocaleString("en-IN",{maximumFractionDigits:0}) : v.toLocaleString("en-IN",{maximumFractionDigits:3});

  return (
    <div style={{ border:`1px solid #E2E8F0`, borderLeft:`4px solid ${ac}`,
      borderRadius:8, padding:"14px 16px", marginBottom:12, background:"white" }}>
      <div style={{ display:"flex", justifyContent:"space-between", flexWrap:"wrap", gap:6, marginBottom:8 }}>
        <div>
          <span style={{ fontWeight:800, fontSize:13, color:"#0F2942" }}>{h.lbl}</span>
          <span style={{ fontSize:10.5, color:"#64748B", marginLeft:10 }}>
            Scope: <b>{fmt(h.scope)} {h.unit}</b> &nbsp;|&nbsp;
            Sch-G: <b>{fmt(h.sg_qty)} {h.unit}</b> &nbsp;|&nbsp;
            Wt: <b>{h.sg_wt}%</b> &nbsp;|&nbsp;
            Value: <b>₹{p2(h.sg_cr)} Cr</b>
          </span>
          {h.note && <div style={{ fontSize:10, color:"#F59E0B", fontWeight:600, marginTop:1 }}>⚠ {h.note}</div>}
        </div>
        <span style={{ fontSize:11, fontWeight:700, color:tc, background:"#F8FAFC",
          padding:"3px 10px", borderRadius:8, border:`1px solid ${ac}`, alignSelf:"flex-start" }}>{lbl}</span>
      </div>

      {/* Quantity grid */}
      <div style={{ display:"grid", gridTemplateColumns:"repeat(5,1fr)", gap:6, marginBottom:10 }}>
        {[["PMC Certified", h.pc,  h.unit,"#10B981","#D1FAE5"],
          ["PMC WIP",       h.pw,  h.unit,"#D97706","#FEF3C7"],
          ["AWF Complete",  h.awf_c,h.unit,"#2563EB","#DBEAFE"],
          ["AWF WIP",       h.awf_w,h.unit,"#7C3AED","#F5F3FF"],
          ["LA Blocked",    h.la,  h.unit,"#DC2626","#FEF2F2"],
        ].map(([l,v,u,c,b])=>(
          <div key={l} style={{ background:b, borderRadius:6, padding:"7px 8px" }}>
            <div style={{ fontSize:9, fontWeight:700, color:c, textTransform:"uppercase", marginBottom:2 }}>{l}</div>
            <div style={{ fontSize:15, fontWeight:800, color:c }}>{fmt(v)}</div>
            <div style={{ fontSize:9, color:c }}>{u}</div>
          </div>
        ))}
      </div>

      {/* Stacked bar */}
      <div style={{ background:"#E2E8F0", borderRadius:6, height:22, display:"flex", overflow:"hidden" }}>
        {[[pcPct,"#10B981","✓"],[pwPct,"#FBBF24","WIP"],[acPct,"#60A5FA","AWF-C"],
          [awPct,"#A78BFA","AWF-W"],[laPct,"#FCA5A5","LA"]].map(([w,c,l],i) => w>0.3 && (
          <div key={i} style={{ width:`${w}%`, background:c, display:"flex",
            alignItems:"center", justifyContent:"center", overflow:"hidden" }}>
            {w>6 && <span style={{ fontSize:9, fontWeight:800, color: c==="#FBBF24"||c==="#FCA5A5"?"#1E293B":"white" }}>
              {l} {w.toFixed(0)}%
            </span>}
          </div>
        ))}
      </div>
      <div style={{ display:"flex", gap:12, marginTop:5, flexWrap:"wrap" }}>
        {[["#10B981","PMC Done"],["#FBBF24","PMC WIP"],["#60A5FA","AWF Done"],["#A78BFA","AWF WIP"],["#FCA5A5","LA Blocked"]].map(([c,l])=>(
          <span key={l} style={{ display:"flex", alignItems:"center", gap:3, fontSize:10, color:"#64748B" }}>
            <span style={{ width:10,height:10,background:c,borderRadius:2,display:"inline-block" }}/>
            {l}
          </span>
        ))}
      </div>
    </div>
  );
}

              <span style={{ background:"#FEF3C7", color:"#92400E", padding:"2px 8px", borderRadius:5, fontWeight:700, marginRight:8 }}>■ PMC WIP</span>
              <span style={{ background:"#DBEAFE", color:"#1D4ED8", padding:"2px 8px", borderRadius:5, fontWeight:700, marginRight:8 }}>■ AWF Completed</span>
              <span style={{ background:"#F5F3FF", color:"#7C3AED", padding:"2px 8px", borderRadius:5, fontWeight:700, marginRight:8 }}>■ AWF WIP</span>
              <span style={{ background:"#FEE2E2", color:"#991B1B", padding:"2px 8px", borderRadius:5, fontWeight:700 }}>■ LA Blocked</span>
            </div>
            {HWY.map(h => <HwyRow key={h.lbl} h={h}/>)}
          </Box>
        )}

        {/* ═══════════════ SCH-G WORK VALUE ═══════════════════════════════════ */}
        {tab === "schg" && <>
          <div style={{ display:"flex", gap:12, flexWrap:"wrap", marginBottom:16 }}>
            <KPI label="BPC (Total Contract Value)" value={`₹${p2(BPC_CR)} Cr`} sub="100%" accent="#1E40AF" bg="#EFF6FF"/>
            <KPI label="PMC-I Certified (Sch-G Rates)" value={`₹${p2(PMC_COMP_CR)} Cr`}
              sub={`${PMC_COMP_PCT}% of BPC`} accent="#059669" bg="#F0FDF4"/>
            <KPI label="WIP (Sch-G Rates)" value={`₹${p2(PMC_WIP_CR)} Cr`}
              sub={`${PMC_WIP_PCT}% of BPC`} accent="#D97706" bg="#FFFBEB"/>
            <KPI label="Total (Comp + WIP)" value={`₹${p2(PMC_COMP_CR+PMC_WIP_CR)} Cr`}
              sub="7.06% of BPC" accent="#7C3AED" bg="#F5F3FF"/>
          </div>

          <Box style={{ marginBottom:0 }}>
            <BHead>ACTIVITY-WISE SCHEDULE-G VALUE vs WORK CERTIFIED</BHead>
            <div style={{ overflowX:"auto" }}>
              <table style={{ width:"100%", borderCollapse:"collapse", fontSize:11.5 }}>
                <thead>
                  <tr style={{ background:"#0F172A" }}>
                    {["Activity","Unit","Sch-G Qty","Sch-G Wt %","Contract Value (₹ Cr)",
                      "PMC-I Cert. Qty","PMC-I Cert. Value","PMC-I WIP Qty","PMC-I WIP Value",
                      "Progress Bar","% Done"].map(h=>(
                      <th key={h} style={{ padding:"9px 8px", color:"#E0F2FE", fontWeight:700,
                        fontSize:10.5, textAlign: h==="Activity"?"left":"center",
                        borderBottom:"2px solid #1E3A5F", whiteSpace:"nowrap" }}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {["Road Works","Structures","RE Wall","Utilities","Other Works"].map(cat => {
                    const rows = SGW.filter(r=>r.cat===cat);
                    const cComp = rows.reduce((s,r)=>s+r.pc_cr,0);
                    const cWip  = rows.reduce((s,r)=>s+r.pw_cr,0);
                    const cCP   = rows.reduce((s,r)=>s+r.sg_cr,0);
                    return [
                      <tr key={`h-${cat}`} style={{ background:"#1E3A5F" }}>
                        <td colSpan={10} style={{ padding:"7px 12px", color:"white", fontWeight:800, fontSize:12 }}>
                          ▶ {cat}
                          <span style={{ marginLeft:16, fontWeight:600, fontSize:10.5, color:"#93C5FD" }}>
                            Total: ₹{p2(cCP)} Cr &nbsp;|&nbsp;
                            Certified: <span style={{ color:"#34D399" }}>₹{p2(cComp)} Cr</span> &nbsp;|&nbsp;
                            WIP: <span style={{ color:"#FCD34D" }}>₹{p2(cWip)} Cr</span>
                          </span>
                        </td>
                      </tr>,
                      ...rows.map((r,i) => {
                        const dp = r.sg_cr > 0 ? (r.pc_cr/r.sg_cr)*100 : 0;
                        const wp = r.sg_cr > 0 ? (r.pw_cr/r.sg_cr)*100 : 0;
                        const [ac,,tc] = stColor(dp+wp);
                        const fmtQ = (v) => v >= 100
                          ? v.toLocaleString("en-IN",{maximumFractionDigits:0})
                          : v.toLocaleString("en-IN",{maximumFractionDigits:3});
                        return (
                          <tr key={r.lbl} style={{ borderBottom:"1px solid #E2E8F0",
                            background:i%2===0?"#F8FAFC":"white" }}>
                            <td style={{ padding:"8px 10px", fontWeight:500, color:"#1E3A5F" }}>{r.lbl}</td>
                            <td style={{ padding:"8px 8px", textAlign:"center", color:"#64748B" }}>{r.unit}</td>
                            <td style={{ padding:"8px 8px", textAlign:"right", fontWeight:600 }}>
                              {fmtQ(r.sg_qty)}
                            </td>
                            <td style={{ padding:"8px 8px", textAlign:"center", fontWeight:700, color:"#7C3AED" }}>
                              {r.sg_wt.toFixed(2)}%
                            </td>
                            <td style={{ padding:"8px 8px", textAlign:"right", fontWeight:600, color:"#1E3A5F" }}>
                              ₹{p2(r.sg_cr)} Cr
                            </td>
                            <td style={{ padding:"8px 8px", textAlign:"right", color: r.pc_qty>0?"#059669":"#9CA3AF", fontWeight:700 }}>
                              {r.pc_qty > 0 ? fmtQ(r.pc_qty) : "—"}
                            </td>
                            <td style={{ padding:"8px 8px", textAlign:"right", color: r.pc_cr>0?"#059669":"#9CA3AF", fontWeight:700 }}>
                              {r.pc_cr > 0 ? `₹${p2(r.pc_cr)} Cr` : "—"}
                            </td>
                            <td style={{ padding:"8px 8px", textAlign:"right", color: r.pw_qty>0?"#D97706":"#9CA3AF", fontWeight:700 }}>
                              {r.pw_qty > 0 ? fmtQ(r.pw_qty) : "—"}
                            </td>
                            <td style={{ padding:"8px 8px", textAlign:"right", color: r.pw_cr>0?"#D97706":"#9CA3AF", fontWeight:700 }}>
                              {r.pw_cr > 0 ? `₹${p2(r.pw_cr)} Cr` : "—"}
                            </td>
                            <td style={{ padding:"6px 8px", minWidth:110 }}>
                              <div style={{ background:"#E2E8F0", borderRadius:4, height:14, overflow:"hidden", position:"relative" }}>
                                {dp>0 && <div style={{ position:"absolute", left:0, height:"100%", width:`${dp}%`, background:"#10B981" }}/>}
                                {wp>0 && <div style={{ position:"absolute", left:`${dp}%`, height:"100%", width:`${wp}%`, background:"#FBBF24" }}/>}
                              </div>
                            </td>
                            <td style={{ padding:"6px 8px", textAlign:"center" }}>
                              <span style={{ background:`${ac}15`, color:tc, padding:"2px 8px",
                                borderRadius:8, fontSize:10, fontWeight:700, border:`1px solid ${ac}50` }}>
                                {p2(dp+wp)}%
                              </span>
                            </td>
                          </tr>
                        );
                      })
                    ];
                  })}
                  {/* Grand Total */}
                  <tr style={{ background:"#0F172A" }}>
                    <td colSpan={4} style={{ padding:"10px 12px", color:"white", fontWeight:800, fontSize:13 }}>
                      GRAND TOTAL
                    </td>
                    <td style={{ padding:"10px 8px", textAlign:"right", color:"#93C5FD", fontWeight:700 }}>
                      ₹{p2(SGW.reduce((s,r)=>s+r.sg_cr,0))} Cr
                    </td>
                    <td colSpan={2} style={{ padding:"10px 8px", textAlign:"right", color:"#34D399", fontWeight:800, fontSize:13 }}>
                      ₹{p2(totalComp)} Cr
                    </td>
                    <td colSpan={2} style={{ padding:"10px 8px", textAlign:"right", color:"#FCD34D", fontWeight:800, fontSize:13 }}>
                      ₹{p2(totalWip)} Cr
                    </td>
                    <td colSpan={2} style={{ padding:"10px 12px", textAlign:"center", color:"white", fontWeight:700 }}>
                      4.26% Cert · 2.80% WIP · <b>7.06% Total</b>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
            <div style={{ marginTop:10, padding:"8px 12px", background:"#F8FAFC",
              borderTop:"1px solid #E2E8F0", fontSize:10.5, color:"#64748B" }}>
              Values at Schedule-G Annexure-I rates (LASA/NHAI-PKG-III/IE/WK73921/NH163G/2025/497, 30.12.2025).
              PMC-I Certified total = ₹{p2(PMC_COMP_CR)} Cr (4.26% of ₹{p2(BPC_CR)} Cr BPC).
              Weightages tentative — shall be revised upon final design per CA Article 23.4.
            </div>
          </Box>
        </>}
      </div>

      {/* FOOTER */}
      <div style={{ background:"#0F172A", padding:"9px 22px", display:"flex",
        justifyContent:"space-between", flexWrap:"wrap", gap:4, fontSize:10, color:"#475569" }}>
        <span>KEPL · NH-163G Pkg-III · Ch. 189.650–220.480 Km · Khammam, Telangana</span>
        <span>CA: 18.12.2023 · Settlement: 10.07.2025 · Sch-G: LASA-497 dt. 30.12.2025</span>
        <span>Report: 27 February 2026 · Submitted to: IE (LASA/EKAM) & NHAI PIU-Khammam-II</span>
      </div>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
  </script>
</body>
</html>
